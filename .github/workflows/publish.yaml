name: Publish to npm

on:
  push:
    tags:
      - 'v*'

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm install

      - name: Install openclaw
        run: |
          mkdir -p ~/.openclaw-cache
          cd ~/.openclaw-cache
          echo '{"name":"openclaw-cache","private":true,"dependencies":{"openclaw":">=2026.3.22"}}' > package.json
          npm install --ignore-scripts

      - name: Link openclaw
        run: |
          mkdir -p node_modules
          ln -s ~/.openclaw-cache/node_modules/openclaw node_modules/openclaw

      - name: Type check
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Publish
        run: npm publish --access public

name: CI
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
      - 'feat-**'

jobs:
  lint:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: ['18', '20', 'latest']

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        run: npm install

      - name: Install openclaw to cache
        run: |
          mkdir -p ~/.openclaw-cache
          cd ~/.openclaw-cache
          npm init -y
          npm install openclaw --ignore-scripts

      - name: Link openclaw
        run: |
          mkdir -p node_modules
          ln -s ~/.openclaw-cache/node_modules/openclaw node_modules/openclaw

      - name: Type check
        run: npm run typecheck

      - name: Build
        run: npm run build
